name: Candidate Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: Exact candidate version (x.y.z-rc.n)
                required: true
                type: string
            unreal_run_id:
                description: Exact successful Trusted Unreal workflow run ID
                required: false
                type: string
            publish:
                description: Publish candidate npm tarballs after protected approval
                required: true
                default: false
                type: boolean

permissions:
    contents: read
    actions: read

concurrency:
    group: candidate-${{ inputs.version }}
    cancel-in-progress: false

jobs:
    candidate:
        name: Build candidate
        runs-on: windows-latest
        timeout-minutes: 45
        steps:
            - name: Checkout exact source
              uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Install pnpm
              uses: pnpm/action-setup@v6

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: pnpm

            - name: Install Rust
              run: rustup toolchain install stable --profile minimal --no-self-update

            - name: Install locked dependencies
              run: pnpm install --frozen-lockfile

            - name: Run portable release gate
              run: pnpm check

            - name: Build maintained applications
              run: pnpm -r --if-present build

            - name: Download exact trusted Unreal evidence
              if: inputs.unreal_run_id != ''
              uses: actions/download-artifact@v7
              with:
                  name: trusted-unreal-evidence
                  path: unreal-evidence
                  github-token: ${{ github.token }}
                  run-id: ${{ inputs.unreal_run_id }}

            - name: Create checksummed candidate
              shell: bash
              env:
                  CANDIDATE_VERSION: ${{ inputs.version }}
                  UNREAL_RUN_ID: ${{ inputs.unreal_run_id }}
              run: |
                  args=(
                    --version "$CANDIDATE_VERSION"
                    --commit "$GITHUB_SHA"
                    --ref "$GITHUB_REF"
                    --output release
                  )
                  if [[ -n "$UNREAL_RUN_ID" ]]; then
                    args+=(--unreal-evidence unreal-evidence --unreal-run-id "$UNREAL_RUN_ID")
                  fi
                  node scripts/create-release-candidate.mjs "${args[@]}"

            - name: Upload immutable candidate
              uses: actions/upload-artifact@v7
              with:
                  name: ue-shed-${{ inputs.version }}
                  path: release/**
                  if-no-files-found: error
                  retention-days: 90

            - name: Validate npm publication without registry writes
              shell: bash
              env:
                  CANDIDATE_VERSION: ${{ inputs.version }}
              run: |
                  packages=(
                    "release/npm/ue-shed-protocol-$CANDIDATE_VERSION.tgz"
                    "release/npm/ue-shed-unreal-connection-$CANDIDATE_VERSION.tgz"
                    "release/npm/ue-shed-cameras-$CANDIDATE_VERSION.tgz"
                    "release/npm/ue-shed-uasset-win32-x64-$CANDIDATE_VERSION.tgz"
                    "release/npm/ue-shed-unreal-assets-$CANDIDATE_VERSION.tgz"
                    "release/npm/ue-shed-uasset-$CANDIDATE_VERSION.tgz"
                  )
                  for package in "${packages[@]}"; do
                    npm publish "$package" --dry-run --access public --tag next
                  done

    provenance:
        name: Attest candidate provenance
        needs: candidate
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            id-token: write
            attestations: write
            artifact-metadata: write
        steps:
            - name: Download candidate
              uses: actions/download-artifact@v7
              with:
                  name: ue-shed-${{ inputs.version }}
                  path: candidate

            - name: Attest checksummed artifacts
              uses: actions/attest@v4
              with:
                  subject-path: |
                      candidate/**/*.tar.gz
                      candidate/**/*.tgz
                      candidate/candidate-manifest.json

    publish:
        name: Publish npm candidate
        if: inputs.publish
        needs:
            - candidate
            - provenance
        environment: npm-release
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Require the exact candidate tag
              shell: bash
              env:
                  CANDIDATE_VERSION: ${{ inputs.version }}
              run: |
                  if [[ "$GITHUB_REF" != "refs/tags/v$CANDIDATE_VERSION" ]]; then
                    echo "Publishing requires dispatching the exact tag refs/tags/v$CANDIDATE_VERSION." >&2
                    exit 1
                  fi

            - name: Install Node.js for npm trusted publishing
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  registry-url: https://registry.npmjs.org
                  package-manager-cache: false

            - name: Install exact npm CLI
              run: npm install --global npm@12.0.1

            - name: Download attested candidate
              uses: actions/download-artifact@v7
              with:
                  name: ue-shed-${{ inputs.version }}
                  path: candidate

            - name: Publish candidate tarballs through OIDC
              shell: bash
              env:
                  CANDIDATE_VERSION: ${{ inputs.version }}
              run: |
                  packages=(
                    "candidate/npm/ue-shed-protocol-$CANDIDATE_VERSION.tgz"
                    "candidate/npm/ue-shed-unreal-connection-$CANDIDATE_VERSION.tgz"
                    "candidate/npm/ue-shed-cameras-$CANDIDATE_VERSION.tgz"
                    "candidate/npm/ue-shed-uasset-win32-x64-$CANDIDATE_VERSION.tgz"
                    "candidate/npm/ue-shed-unreal-assets-$CANDIDATE_VERSION.tgz"
                    "candidate/npm/ue-shed-uasset-$CANDIDATE_VERSION.tgz"
                  )
                  for package in "${packages[@]}"; do
                    npm publish "$package" --access public --tag next
                  done
